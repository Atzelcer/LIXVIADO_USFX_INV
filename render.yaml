services:
  - type: web
    name: lixivialab-ml
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --app-dir modelo --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
